language: en-US

reviews:
  profile: assertive
  high_level_summary: true
  review_status: true
  commit_status: true
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: false
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - app/**
    - core-network/**
    - core-service/**
    - '!**/build/**'
    - '!.gradle/**'
    - '!.idea/**'
    - '!**/generated/**'
    - '!**/intermediates/**'
    - '!**/outputs/**'
    - '!**/tmp/**'

chat:
  auto_reply: true